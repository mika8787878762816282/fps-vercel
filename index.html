<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Monde 3D Mobile - Château</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:Arial}
    #ui{position:fixed;top:10px;left:10px;right:10px;z-index:10;color:#fff;background:rgba(0,0,0,.45);padding:10px;border-radius:10px;font-size:14px}
    .joyWrap{position:fixed;bottom:26px;width:132px;height:132px;border-radius:66px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);z-index:30;touch-action:none}
    #joyL{left:20px}
    #joyR{right:20px}
    .knob{position:absolute;left:41px;top:41px;width:50px;height:50px;border-radius:25px;background:rgba(255,255,255,.35);pointer-events:none}
    #jump{position:fixed;bottom:176px;right:34px;z-index:31;width:84px;height:84px;border-radius:42px;border:0;background:rgba(0,170,255,.55);color:#fff;font-weight:700}
  </style>
</head>
<body>
  <div id="ui">2 joysticks: gauche = déplacement • droite = caméra • JUMP = saut</div>
  <div id="joyL" class="joyWrap"><div class="knob" id="knobL"></div></div>
  <div id="joyR" class="joyWrap"><div class="knob" id="knobR"></div></div>
  <button id="jump">JUMP</button>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9ec1ff);
    scene.fog = new THREE.Fog(0x9ec1ff, 90, 450);

    const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
    camera.position.set(0, 2, 45);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.5;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x778899, 1.4));
    const sun = new THREE.DirectionalLight(0xffffff, 2.2);
    sun.position.set(60,80,20); scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const headLamp = new THREE.PointLight(0xffffff, 1.4, 140);
    camera.add(headLamp);
    scene.add(camera);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(1400,1400),
      new THREE.MeshStandardMaterial({color:0x5f8a57})
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    // Château procédural (formes, pas juste des cubes)
    const stone = new THREE.MeshStandardMaterial({color:0xa2a2a2, roughness:0.9});
    const roof = new THREE.MeshStandardMaterial({color:0x5a2f2f, roughness:0.8});

    function wall(x,z,w,d,h=11){
      const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), stone);
      m.position.set(x,h/2,z); scene.add(m);
    }
    function tower(x,z,r=5,h=24){
      const body = new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,24), stone);
      body.position.set(x,h/2,z); scene.add(body);
      const top = new THREE.Mesh(new THREE.ConeGeometry(r*1.2,7,24), roof);
      top.position.set(x,h+3.5,z); scene.add(top);
    }

    // enceinte
    wall(0,-80,120,4); wall(0,80,120,4); wall(-80,0,4,120); wall(80,0,4,120);
    tower(-80,-80); tower(80,-80); tower(-80,80); tower(80,80);

    // donjon central
    const keep = new THREE.Mesh(new THREE.CylinderGeometry(18,18,30,28), stone);
    keep.position.set(0,15,0); scene.add(keep);
    const keepRoof = new THREE.Mesh(new THREE.ConeGeometry(22,14,28), roof);
    keepRoof.position.set(0,37,0); scene.add(keepRoof);

    // passerelle / entrée
    wall(0,-38,20,4,10);
    const gate = new THREE.Mesh(new THREE.BoxGeometry(8,8,3.5), new THREE.MeshStandardMaterial({color:0x4a2f1b}));
    gate.position.set(0,4,-78); scene.add(gate);

    // modèle château GitHub en plus
    const loader = new GLTFLoader();
    loader.load('./models/castle/scene.gltf', (gltf) => {
      const castle = gltf.scene;
      castle.position.set(0, 0, -170);
      castle.scale.setScalar(10);
      scene.add(castle);
    }, undefined, (err) => console.warn('GLTF non chargé:', err?.message || err));

    // Joysticks
    const state = {mx:0,mz:0,lx:0,ly:0,jump:false};
    function setupJoystick(wrapId, knobId, onMove){
      const wrap = document.getElementById(wrapId);
      const knob = document.getElementById(knobId);
      const R = 45;
      let active = false;

      const setKnob = (x,y)=>{ knob.style.left = `${41 + x}px`; knob.style.top = `${41 + y}px`; };
      const reset = ()=>{ active=false; setKnob(0,0); onMove(0,0); };

      function moveAt(clientX, clientY){
        const rect = wrap.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        let dx = clientX - cx;
        let dy = clientY - cy;
        const len = Math.hypot(dx,dy);
        if(len > R){ dx = dx/len*R; dy = dy/len*R; }
        setKnob(dx,dy);
        onMove(dx/R, dy/R);
      }

      wrap.addEventListener('touchstart', e=>{e.preventDefault(); active=true; moveAt(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
      wrap.addEventListener('touchmove', e=>{ if(!active) return; e.preventDefault(); moveAt(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
      wrap.addEventListener('touchend', reset);

      wrap.addEventListener('mousedown', e=>{active=true; moveAt(e.clientX,e.clientY);});
      window.addEventListener('mousemove', e=>{if(active) moveAt(e.clientX,e.clientY);});
      window.addEventListener('mouseup', reset);
    }

    setupJoystick('joyL','knobL',(x,y)=>{ state.mx = x; state.mz = y; });
    setupJoystick('joyR','knobR',(x,y)=>{ state.lx = x; state.ly = y; });

    const jumpBtn = document.getElementById('jump');
    const jOn=()=>state.jump=true, jOff=()=>state.jump=false;
    jumpBtn.addEventListener('touchstart',e=>{e.preventDefault();jOn();},{passive:false});
    jumpBtn.addEventListener('touchend',jOff);
    jumpBtn.addEventListener('mousedown',jOn);
    jumpBtn.addEventListener('mouseup',jOff);
    jumpBtn.addEventListener('mouseleave',jOff);

    let yaw=0, pitch=0, yVel=0, canJump=true;
    const speed=16, gravity=22, eye=2;
    const clock = new THREE.Clock();

    function animate(){
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(),0.05);

      yaw -= state.lx * 2.2 * dt;
      pitch -= state.ly * 1.7 * dt;
      pitch = Math.max(-1.2, Math.min(1.2, pitch));

      const forward = new THREE.Vector3(Math.sin(yaw),0,-Math.cos(yaw));
      const right = new THREE.Vector3(Math.cos(yaw),0,Math.sin(yaw));
      const move = new THREE.Vector3();
      move.addScaledVector(forward, -state.mz);
      move.addScaledVector(right, state.mx);
      if(move.lengthSq() > 0){ move.normalize().multiplyScalar(speed*dt); camera.position.add(move); }

      yVel -= gravity*dt;
      camera.position.y += yVel*dt;
      if(camera.position.y < eye){ camera.position.y=eye; yVel=0; canJump=true; }
      if(state.jump && canJump){ yVel = 9.5; canJump=false; }

      camera.rotation.order='YXZ';
      camera.rotation.y = yaw;
      camera.rotation.x = pitch;

      renderer.render(scene,camera);
    }
    animate();

    addEventListener('resize',()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
