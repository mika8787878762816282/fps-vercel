<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Monde 3D Mobile</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:Arial}
    #ui{position:fixed;top:12px;left:12px;right:12px;z-index:10;color:#fff;background:rgba(0,0,0,.45);padding:10px;border-radius:10px}
    #pad{position:fixed;bottom:20px;left:20px;z-index:20;display:grid;grid-template-columns:56px 56px 56px;gap:8px}
    .b{width:56px;height:56px;border-radius:12px;border:0;background:rgba(255,255,255,.2);color:#fff;font-size:24px}
    #jump{position:fixed;bottom:26px;right:24px;z-index:20;width:80px;height:80px;border-radius:40px;border:0;background:rgba(0,170,255,.45);color:#fff;font-weight:700}
  </style>
</head>
<body>
  <div id="ui">Swipe pour regarder • Boutons pour bouger • Jump à droite</div>
  <div id="pad">
    <div></div><button class="b" id="f">↑</button><div></div>
    <button class="b" id="l">←</button><button class="b" id="b">↓</button><button class="b" id="r">→</button>
  </div>
  <button id="jump">JUMP</button>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.161.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87a8ff);
    scene.fog = new THREE.Fog(0x87a8ff, 50, 300);

    const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1500);
    camera.position.set(0,2,30);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.6;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x667799, 1.4));
    const sun = new THREE.DirectionalLight(0xffffff, 2.2);
    sun.position.set(30,60,20); scene.add(sun);
    const fill = new THREE.AmbientLight(0xffffff, 1.1);
    scene.add(fill);
    const headLamp = new THREE.PointLight(0xffffff, 1.6, 140);
    camera.add(headLamp);
    scene.add(camera);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(900,900),
      new THREE.MeshStandardMaterial({color:0x4f7f4f})
    );
    ground.rotation.x = -Math.PI/2; scene.add(ground);

    const stone = new THREE.MeshStandardMaterial({color:0x9d9d9d});
    function box(x,y,z,w,h,d){
      const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), stone);
      m.position.set(x,y,z); scene.add(m);
    }
    box(0,5,-50,60,10,3); box(0,5,50,60,10,3); box(-50,5,0,3,10,60); box(50,5,0,3,10,60);
    box(-50,10,-50,8,20,8); box(50,10,-50,8,20,8); box(-50,10,50,8,20,8); box(50,10,50,8,20,8);
    box(0,3,0,20,6,20);

    const loader = new GLTFLoader();
    loader.load('./models/castle/scene.gltf', (gltf) => {
      const castle = gltf.scene;
      castle.position.set(0, 0, -90);
      castle.scale.setScalar(8);
      scene.add(castle);
    }, undefined, (err) => {
      console.error('Erreur chargement château:', err);
    });

    const state = {f:0,b:0,l:0,r:0,j:0};
    const bind = (id,key)=>{
      const el = document.getElementById(id);
      const on=()=>state[key]=1, off=()=>state[key]=0;
      el.addEventListener('touchstart',e=>{e.preventDefault();on();},{passive:false});
      el.addEventListener('touchend',off);
      el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
    };
    bind('f','f'); bind('b','b'); bind('l','l'); bind('r','r'); bind('jump','j');

    let yaw=0,pitch=0,lastX=0,lastY=0,drag=false;
    renderer.domElement.addEventListener('touchstart',e=>{drag=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;},{passive:true});
    renderer.domElement.addEventListener('touchmove',e=>{
      if(!drag)return;
      const t=e.touches[0],dx=t.clientX-lastX,dy=t.clientY-lastY; lastX=t.clientX; lastY=t.clientY;
      yaw -= dx*0.003; pitch -= dy*0.002; pitch=Math.max(-1.2,Math.min(1.2,pitch));
    },{passive:true});
    renderer.domElement.addEventListener('touchend',()=>drag=false);

    let yVel=0, canJump=true;
    const speed=8, gravity=20, eye=2;
    const clock = new THREE.Clock();

    function animate(){
      requestAnimationFrame(animate);
      const dt=Math.min(clock.getDelta(),0.05);

      const forward = new THREE.Vector3(Math.sin(yaw),0,-Math.cos(yaw));
      const right = new THREE.Vector3(Math.cos(yaw),0,Math.sin(yaw));
      const move = new THREE.Vector3();
      if(state.f) move.add(forward);
      if(state.b) move.sub(forward);
      if(state.r) move.add(right);
      if(state.l) move.sub(right);
      if(move.lengthSq()>0){ move.normalize().multiplyScalar(speed*dt); camera.position.add(move); }

      yVel -= gravity*dt;
      camera.position.y += yVel*dt;
      if(camera.position.y<eye){ camera.position.y=eye; yVel=0; canJump=true; }
      if(state.j && canJump){ yVel=8; canJump=false; }

      camera.rotation.order='YXZ';
      camera.rotation.y=yaw;
      camera.rotation.x=pitch;

      renderer.render(scene,camera);
    }
    animate();

    addEventListener('resize',()=>{
      camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight);
    });
  </script>
</body>
</html>
